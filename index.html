<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Op Art</title>
  <link rel="stylesheet" href="style.css" />
</head>
<style>
  body {
  margin: 0;
  background: #e8e4d8;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

#wrapper {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
}

#c {
  cursor: pointer;
}

#hint {
  margin: 0;
  font-family: sans-serif;
  font-size: 13px;
  color: #111;
  letter-spacing: 0.05em;
  opacity: 1;
  transition: opacity 0.6s ease;
}
</style>
<body>
  <div id="wrapper">
    <div id="c"></div>
    <p id="hint">clique na obra para animar</p>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script src="DiegoFigueiredo.js"></script>
</body>
</html>
